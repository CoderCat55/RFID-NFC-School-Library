<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➕ Add New Book</h1>
            <div style="display: flex; gap: 10px;">
                <a href="/admin" class="btn">← Admin</a>
                <a href="/admin-logout" class="btn">🚪 Logout</a>
            </div>
        </div>
        
        <div class="section">
            <form id="addBookForm">
                <div class="form-group">
                    <label for="rfid_uid">RFID UID *</label>
                    <input type="text" id="rfid_uid" name="rfid_uid" 
                           placeholder="Scan or type RFID tag number" required autofocus>
                    <small>Use your phone's NFC app to read the tag, then copy-paste the UID here</small>
                </div>
                
                <div class="form-group">
                    <label for="title">Book Title *</label>
                    <input type="text" id="title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" name="author" required>
                </div>
                
                <div class="form-group">
                    <label for="language">Language *</label>
                    <select id="language" name="language" required>
                        <option value="">Select language...</option>
                        <option value="English">English</option>
                        <option value="Turkish">Turkish</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Arabic">Arabic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="shelf_number">Shelf/Location Number *</label>
                    <input type="text" id="shelf_number" name="shelf_number" 
                           placeholder="e.g., A-12, Section B Row 3" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Book</button>
            </form>
            
            <div id="message" class="message" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        document.getElementById('addBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                rfid_uid: document.getElementById('rfid_uid').value.trim(),
                title: document.getElementById('title').value.trim(),
                author: document.getElementById('author').value.trim(),
                language: document.getElementById('language').value,
                shelf_number: document.getElementById('shelf_number').value.trim()
            };
            
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/add-book', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + data.message;
                    messageDiv.style.display = 'block';
                    
                    // Clear form
                    document.getElementById('addBookForm').reset();
                    document.getElementById('rfid_uid').focus();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + data.message;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Network error. Please try again.';
                messageDiv.style.display = 'block';
                console.error('Error:', error);
            }
            
            // Hide message after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
