<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Access</h1>
            <a href="/" class="btn">← Home</a>
        </div>
        
        <div class="login-container">
            <h2>Enter Student Number</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="student_number" name="student_number" 
                           required placeholder="Enter your student number" autofocus>
                </div>
                <button type="submit" class="btn btn-primary">Continue</button>
            </form>
            <div id="error" class="message error" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentNumber = document.getElementById('student_number').value;
            
            try {
                const response = await fetch('/api/verify-student', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ student_number: studentNumber })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = `/student/${data.student_id}`;
                } else {
                    const errorDiv = document.getElementById('error');
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred');
            }
        });
    </script>
</body>
</html>
